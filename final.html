<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NMBConnect - Application Status</title>
  <link rel="icon" type="image/svg+xml" href="vite.svg">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .status-card {
      background: white;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 400px;
      margin: 60px auto;
    }
    .status-card h1 {
      color: #0f4a8a;
      font-size: 24px;
      margin-bottom: 15px;
    }
    .status-card p {
      color: #4b5563;
      font-size: 16px;
      line-height: 1.5;
    }
    .status-icon {
      font-size: 48px;
      color: #10b981;
      margin-bottom: 20px;
    }
    .back-home {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 24px;
      background-color: #0f4a8a;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
    }
    .back-home:hover {
      background-color: #0d3d72;
    }
  </style>
</head>
<body>

  <!-- Top Navigation (optional styling similar to other pages) -->
  <header>
    <div class="header-content">
      <div class="logo">
        <span class="logo-text">NMB<span class="logo-highlight">Connect</span></span>
      </div>
    </div>
  </header>

  <main>
    <div class="status-card">
      <div class="status-icon">✅</div>
      <h1>Application Received</h1>
      <p>Your application is currently under review. Our team will contact you shortly regarding the next steps.</p>
      
      <a href="index.html" class="back-home">Return Home</a>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 NMB Holdings | Secure Portal</p>
  </footer>

</body>
</html>
