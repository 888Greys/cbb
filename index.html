<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMBConnect - Quick Loan Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f6f8;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Top Blue Header Banner */
        .header-banner {
            background-color: #1a56db;
            color: white;
            padding: 30px 20px 80px 20px;
            text-align: center;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: #facc15;
        }

        .sub-header-title {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 4px;
        }

        /* Main Container Card */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding: 20px;
            margin-top: -70px; /* Overlap the blue header */
        }

        .calculator-card {
            background: #ffffff;
            width: 100%;
            max-width: 520px;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.08);
        }

        .card-title {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 6px;
        }

        .card-subtitle {
            text-align: center;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 25px;
        }

        /* Slider Section Box */
        .slider-box {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
        }

        .slider-value-display {
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 4px;
        }

        .slider-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #6b7280;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        /* Range Sliders Style */
        .range-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #e5e7eb;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #1a56db;
            border: 3px solid #ffffff;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            cursor: pointer;
        }

        .slider-limits {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #9ca3af;
            margin-top: 8px;
            font-weight: 500;
        }

        /* Summary Breakdown Panel */
        .summary-panel {
            border-top: 1px solid #e5e7eb;
            padding-top: 16px;
            margin-top: 20px;
            margin-bottom: 24px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 14px;
        }

        .summary-row.rate {
            color: #4b5563;
            font-weight: 500;
        }

        .summary-row.monthly {
            color: #374151;
            font-weight: 600;
        }

        .summary-row.total {
            color: #1f2937;
            font-weight: 700;
            font-size: 16px;
        }

        .summary-value {
            font-weight: 700;
            color: #1f2937;
        }

        /* Continue Button */
        .btn-continue {
            width: 100%;
            background-color: #1a56db;
            color: white;
            font-weight: 600;
            font-size: 14px;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-continue:hover {
            background-color: #1e40af;
        }

        /* Footer */
        .footer {
            background-color: #1a56db;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            padding: 16px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <!-- Header Banner -->
    <div class="header-banner">
        <div class="logo-container">
            <div class="logo-text">NMB<span>Connect</span></div>
            <div class="sub-header-title">Quick Loan Calculator</div>
        </div>
    </div>

    <!-- Main Calculator Card -->
    <div class="main-content">
        <div class="calculator-card">
            <h1 class="card-title">How Much Do You Need?</h1>
            <p class="card-subtitle">Drag to select your loan amount</p>

            <!-- Loan Amount Slider Box -->
            <div class="slider-box">
                <div class="slider-value-display" id="amountDisplay">$500</div>
                <div class="slider-label">Loan Amount (USD)</div>
                <input type="range" id="amountRange" class="range-slider" min="100" max="5000" step="50" value="500">
                <div class="slider-limits">
                    <span id="minAmountLabel">$100</span>
                    <span id="maxAmountLabel">$5,000</span>
                </div>
            </div>

            <!-- Loan Term Slider Box -->
            <div class="slider-box">
                <div class="slider-value-display" id="termDisplay">12 Months</div>
                <div class="slider-label">Loan Term</div>
                <input type="range" id="termRange" class="range-slider" min="6" max="60" step="1" value="12">
                <div class="slider-limits">
                    <span>6 months</span>
                    <span>60 months</span>
                </div>
            </div>

            <!-- Calculation Output Breakdown -->
            <div class="summary-panel">
                <div class="summary-row rate">
                    <span>Interest Rate:</span>
                    <span class="summary-value">8% per annum</span>
                </div>
                <div class="summary-row monthly">
                    <span>Monthly Payment:</span>
                    <span class="summary-value" id="monthlyPayment">$43.49</span>
                </div>
                <div class="summary-row total">
                    <span>Total Payable:</span>
                    <span class="summary-value" id="totalPayable">$540</span>
                </div>
            </div>

            <!-- Action Button -->
            <button type="button" class="btn-continue" id="continueBtn">CONTINUE</button>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2026 NMB Holdings | Secure Lending Platform
    </div>

    <script>
        const amountRange = document.getElementById('amountRange');
        const termRange = document.getElementById('termRange');
        const amountDisplay = document.getElementById('amountDisplay');
        const termDisplay = document.getElementById('termDisplay');
        const monthlyPaymentEl = document.getElementById('monthlyPayment');
        const totalPayableEl = document.getElementById('totalPayable');
        const continueBtn = document.getElementById('continueBtn');

        const ANNUAL_INTEREST_RATE = 0.08; // 8%

        function calculateLoan() {
            const principal = parseFloat(amountRange.value);
            const months = parseInt(termRange.value);

            // Update UI Labels
            amountDisplay.textContent = `$${principal.toLocaleString()}`;
            termDisplay.textContent = `${months} Month${months > 1 ? 's' : ''}`;

            // Formula for standard loan amortization
            const monthlyRate = ANNUAL_INTEREST_RATE / 12;
            let monthlyPayment = 0;
            let totalPayable = 0;

            if (monthlyRate === 0) {
                monthlyPayment = principal / months;
                totalPayable = principal;
            } else {
                monthlyPayment = (principal * monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
                totalPayable = monthlyPayment * months;
            }

            // Update Breakdown Displays
            monthlyPaymentEl.textContent = `$${monthlyPayment.toFixed(2)}`;
            totalPayableEl.textContent = `$${Math.round(totalPayable).toLocaleString()}`;
        }

        // Event Listeners for Real-time Calculation
        amountRange.addEventListener('input', calculateLoan);
        termRange.addEventListener('input', calculateLoan);

        // Action Trigger
        continueBtn.addEventListener('click', () => {
            // Save state to sessionStorage
            sessionStorage.setItem('loanAmount', amountDisplay.textContent);
            sessionStorage.setItem('loanTerm', termDisplay.textContent);
            sessionStorage.setItem('monthlyPayment', monthlyPaymentEl.textContent);
            
            // Redirect to login
            window.location.href = 'login.html';
        });

        // Initialize on load
        calculateLoan();
    </script>
</body>
</html>
