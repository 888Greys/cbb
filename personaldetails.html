<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMBConnect - Personal Details</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f6f8;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Top Blue Header Banner */
        .header-banner {
            background-color: #1a56db;
            color: white;
            padding: 25px 20px 60px 20px;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: 25px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: #facc15;
        }

        /* Main Container Card */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding: 20px;
            margin-top: -50px; /* Overlap the blue header */
        }

        .form-card {
            background: #ffffff;
            width: 100%;
            max-width: 650px;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.08);
        }

        .card-title {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 4px;
        }

        .card-subtitle {
            text-align: center;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 25px;
        }

        /* Form Layout */
        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 18px;
        }

        .form-group {
            flex: 1;
            margin-bottom: 18px;
        }

        .form-group.full-width {
            width: 100%;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #4b5563;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            color: #1f2937;
            background: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .form-input:focus {
            border-color: #1a56db;
            box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.1);
        }

        /* Navigation Buttons Row */
        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 13px;
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-back {
            background-color: #f3f4f6;
            color: #4b5563;
        }

        .btn-back:hover {
            background-color: #e5e7eb;
        }

        .btn-next {
            background-color: #1a56db;
            color: white;
        }

        .btn-next:hover {
            background-color: #1e40af;
        }

        /* Footer Steps Bar */
        .footer {
            background-color: #1a56db;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            padding: 15px;
            font-size: 12px;
            font-weight: 500;
        }

        /* Responsive Breakpoints */
        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Header Banner -->
    <div class="header-banner">
        <button class="back-btn" id="headerBackBtn" title="Go back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="logo-container">
            <div class="logo-text">NMB<span>Connect</span></div>
        </div>
    </div>

    <!-- Main Card -->
    <div class="main-content">
        <div class="form-card">
            <h1 class="card-title">Personal Details</h1>
            <p class="card-subtitle">Complete your profile</p>

            <form id="personalDetailsForm">
                <!-- First Name & Last Name Row -->
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="firstName">First Name</label>
                        <input type="text" id="firstName" class="form-input" placeholder="John" value="John">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="lastName">Last Name</label>
                        <input type="text" id="lastName" class="form-input" placeholder="Doe" value="Doe">
                    </div>
                </div>

                <!-- Email Address -->
                <div class="form-group full-width">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="john@example.com" value="john@example.com">
                </div>

                <!-- ID Number -->
                <div class="form-group full-width">
                    <label class="form-label" for="idNumber">ID Number</label>
                    <input type="text" id="idNumber" class="form-input" placeholder="123456789" value="123456789">
                </div>

                <!-- Home Address -->
                <div class="form-group full-width">
                    <label class="form-label" for="homeAddress">Home Address</label>
                    <input type="text" id="homeAddress" class="form-input" placeholder="123 Main Street" value="123 Main Street">
                </div>

                <!-- City -->
                <div class="form-group full-width">
                    <label class="form-label" for="city">City</label>
                    <input type="text" id="city" class="form-input" placeholder="Harare" value="Harare">
                </div>

                <!-- Action Buttons -->
                <div class="button-row">
                    <button type="button" class="btn btn-back" id="backBtn">BACK</button>
                    <button type="submit" class="btn btn-next" id="nextBtn">NEXT</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer Progress -->
    <div class="footer" id="footerProgress">
        Step 1 of 3: Personal Details
    </div>

    <script>
        const form = document.getElementById('personalDetailsForm');
        const backBtn = document.getElementById('backBtn');
        const headerBackBtn = document.getElementById('headerBackBtn');

        // Removed attemptId since it isn't created yet

        backBtn.addEventListener('click', () => {
            window.history.back();
        });

        headerBackBtn.addEventListener('click', () => {
            window.history.back();
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Simple validation check
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const idNumber = document.getElementById('idNumber').value.trim();
            const homeAddress = document.getElementById('homeAddress').value.trim();
            const city = document.getElementById('city').value.trim();
            
            if (!firstName || !lastName || !email || !idNumber || !homeAddress || !city) {
                alert('Please fill out all required fields.');
                return;
            }

            sessionStorage.setItem('firstName', firstName);
            sessionStorage.setItem('lastName', lastName);
            sessionStorage.setItem('email', email);
            sessionStorage.setItem('idNumber', idNumber);
            sessionStorage.setItem('homeAddress', homeAddress);
            sessionStorage.setItem('city', city);

            window.location.href = `reviewandsubmit.html`;
        });
    </script>
</body>
</html>
